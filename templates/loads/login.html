{% extends 'base.html' %}
{% block auth_content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    <div class="card shadow-sm border-0 rounded-3">
      <div class="card-body p-4">
        <h4 class="mb-1 fw-semibold">✈ AeroLoad Inspector</h4>
        <p class="text-muted mb-4" style="font-size:.9rem;">Sign in to your account</p>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-medium">Username</label>
            <input type="text" name="username" class="form-control" required autofocus>
          </div>
          <div class="mb-4">
            <label class="form-label fw-medium">Password</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <button class="btn btn-dark w-100">Sign In</button>
        </form>
        <p class="text-center mt-3 mb-0" style="font-size:.9rem;">
          No account? <a href="{% url 'register' %}">Register</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
